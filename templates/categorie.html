<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="{{ url_for('static', filename='categorie.css') }}"/>
  <title>Css Responsive Flexbox Cards</title>
</head>

<body>
  <div class="container">
    <div class="heading">
      <h1>Que voulez vous apprendre</h1>
      <h1>Aujourd'hui?</h1>
    </div>
    <div class="row">
      {% for item in category %}
      <div class="card">
        <div class="card-header">
          <h1>{{ item['vcategory_name'] }}</h1>
        </div>
        <div class="card-body">
          <p>
            lorem zo, consectetur adipisicing elit. Quasi neque molestiae eius explicabo mollitia tempore reiciendis, vel, sequi.
          </p>
          <a href="#" class="btn">Read more</a>
        </div>
      </div>
      {% endfor %}
      
      
      
    </div>
  </div>
</body>

</html>
